<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - myTeacher</title>
    <link rel="stylesheet" href="/Styles/style registro.css">
</head>
<body>
    <div class="container">
    <div class="logo">
        <img src="/Imagenes/Logo.png" alt="logo-top">
    </div>
     
    <div class="card">
        

        <h2>Crear cuenta</h2>

        <form id="formRegistro">
            <input type="text" placeholder="Nombre completo" required>
            <input type="email" placeholder="Correo electrónico" required>
            <input type="password" placeholder="Contraseña" required>
            <input type="password" placeholder="Confirmar contraseña" required>

            <div class="tipo">
                <label><input type="checkbox"> Estudiante</label>
                <label><input type="checkbox"> Tutor</label>
            </div>

            <button type="submit">Registrarse</button>
        </form>

        <p class="login">¿Ya tienes cuenta? <a href="/HTML/Inicio_sesion.html">Iniciar sesión</a></p>
    </div>
</div>

<script src="Scripts/Scripts.js"></script>
</body>
</html>
