<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro - myTeacher</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/Styles/Autenticacion/style_registro.css" />
</head>
<body>

  <div class="container">

    <div class="logo-area">
      <img src="/Imagenes/Logo.png" alt="myTeacher logo" />
    </div>

    <div class="card">
      <h2>Crear cuenta</h2>

      <div class="field">
        <label>Nombre completo</label>
        <div class="input-group">
          <input type="text" placeholder="Nombre y apellido" />
        </div>
      </div>

      <div class="field">
        <label>Correo electronico</label>
        <div class="input-group">
          <input type="email" placeholder="Correo@ejemplo.com" />
          <span class="icon"><i class="fa-regular fa-envelope"></i></span>
        </div>
      </div>

      <div class="field">
        <label>Contraseña</label>
        <div class="input-group">
          <input type="password" id="pass1" placeholder="············"  autocomplete="new-password"/>
          <span class="icon" id="toggle1">
        <i class="fa-regular fa-eye-slash"></i>
    </span>
        </div>
      </div>

      <div class="field">
        <label>Confirmar contraseña</label>
        <div class="input-group">
          <input type="password" id="pass2" placeholder="············"  autocomplete="new-password" />
          <span class="icon" id="toggle2">
        <i class="fa-regular fa-eye-slash"></i>
    </span>
        </div>
      </div>

      <div class="field">
        <label>Tipo de cuenta</label>
        <div class="tipo-row">
          <label class="check-label">
            <input type="checkbox" id="estudiante" /> Estudiante
          </label>
          <label class="check-label">
            <input type="checkbox" id="tutor" /> Tutor
          </label>
        </div>
      </div>

      <button class="btn-registrar">Registrarse</button>
    </div>

    <p class="login-link">¿Ya tienes cuenta? <a href="/HTML/Autenticacion/inicio_sesion.html">Iniciar sesion</a></p>

  </div>

 <script src="/Scripts/Autenticacion/script_registro.js"></script>

</body>
</html>
