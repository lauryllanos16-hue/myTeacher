<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>myTeacher</title>
<link rel="stylesheet" href="/Styles/style_pagina_principal.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
    <div class="logo">📚 myTeacher</div>
    <nav>
        <a href="#">Buscar</a>
        <a href="#">Mis reservas</a>
        <a href="#">Historial</a>
        <a href="#">Perfil</a>
        <span class="bell">🔔</span>
    </nav>
</header>

<!-- BUSCADOR -->
<section class="search-box">
    <h3>🔎 Buscar tutor</h3>

    <div class="filters">
        <label>Materia</label>
        <select>
            <option>Matemáticas</option>
        </select>

        <label>Modalidad</label>
        <select>
            <option>Presencial</option>
        </select>

        <label>Nivel</label>
        <select>
            <option>Universitario</option>
        </select>
    </div>

    <button>Buscar</button>
</section>

<!-- LISTA DE TUTORES -->
<section class="tutors">
    <h3 class="section-title">📚 Tutores recomendados</h3>

    <div id="tutor-list"></div>

    <button class="more-btn">Ver más</button>
</section>

<!-- FOOTER -->
<footer>
    <div class="footer-left">
        <h4>📚 myTeacher</h4>
        <p>Contactos</p>
        <p>Número: +57 302 xxx xxx</p>
        <p>Correo: soporte@unilibre.edu</p>
    </div>

    <div class="footer-right">
        <p>Síguenos</p>
        <div class="socials">
            <span>📘</span>
            <span>📸</span>
            <span>❌</span>
        </div>
    </div>
</footer>

<script src="/Scripts/script_pagina_principal.js"></script>
</body>
</html>
